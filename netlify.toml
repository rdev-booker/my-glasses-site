[build]
  base    = "my-glasses-site"
  # Install server deps first so esbuild can bundle the Netlify Function
  command = "npm install --prefix server && npm run build"
  publish = "build"

[functions]
  # Relative to base directory (my-glasses-site)
  directory    = "netlify/functions"
  node_bundler = "esbuild"

# ── /api/* must come BEFORE the SPA catch-all ───────────────────────────────
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200

# ── SPA fallback — all other routes serve index.html ─────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
